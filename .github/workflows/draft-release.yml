name: Draft release from commits

# Replaces release-drafter. Whenever main moves forward, this workflow
# rebuilds (or creates) a draft release whose body is the actual list of
# commits since the last published tag — and whose tag_name is a semver
# bump from that tag.
#
# Bump rule for the draft tag:
#   - any commit message contains "BREAKING CHANGE" or matches a
#     conventional-commit "!" suffix (e.g. "feat!:")  → major
#   - any commit message starts with "feat(...)?:"     → minor
#   - otherwise                                        → patch
#
# The previous tag's prefix is preserved: if the last published tag was
# "2.1.24" the next draft is "2.1.25"; if it was "v2.1.24" the next
# draft is "v2.1.25".

on:
  push:
    branches: ["1.x", "2.x"]
  workflow_dispatch:
    inputs:
      previous_tag:
        description: "Override previous tag (e.g. v1.0.0-beta.3). Leave blank to auto-detect."
        required: false
        type: string
      next_tag:
        description: "Override next tag (e.g. v2.0.0-beta.1). Leave blank to auto-calculate."
        required: false
        type: string
      include_full_commits:
        description: "Include full commit bodies in the changelog."
        required: false
        type: boolean
        default: false
      exclude_co_authors:
        description: "Exclude 'Co-authored-by' lines from full commit bodies."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: draft-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    # This job will ALWAYS run when manually triggered via workflow_dispatch.
    # It will ONLY run automatically on push if you create a Repository Variable named 'ENABLE_AUTO_DRAFT' and set it to 'true'.
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_AUTO_DRAFT == 'true'
    steps:
      - name: Build draft from commit history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          HEAD_REF: ${{ github.ref_name }}
          INPUT_PREVIOUS_TAG: ${{ inputs.previous_tag }}
          INPUT_NEXT_TAG: ${{ inputs.next_tag }}
          INPUT_INCLUDE_FULL_COMMITS: ${{ inputs.include_full_commits }}
          INPUT_EXCLUDE_CO_AUTHORS: ${{ inputs.exclude_co_authors }}
        run: |
          set -euo pipefail

          # ---------------------------------------------------------------
          # 1. Find the most recent published (non-draft) tag for this branch.
          # ---------------------------------------------------------------
          if [ -n "${INPUT_PREVIOUS_TAG:-}" ]; then
            previous_tag="${INPUT_PREVIOUS_TAG}"
          else
            # Extract major version from branch name (e.g. "2.x" -> "2")
            if [[ "$HEAD_REF" =~ ^([0-9]+)\.x$ ]]; then
              major_branch="${BASH_REMATCH[1]}"
              # Find the latest tag that belongs to this major version
              previous_tag=$(gh api "repos/${GH_REPO}/releases?per_page=100" \
                --jq "[.[] | select(.draft == false and (.tag_name | test(\"^v?${major_branch}\\\\.\"))) | .tag_name][0] // empty")
            else
              previous_tag=$(gh api "repos/${GH_REPO}/releases?per_page=100" \
                --jq '[.[] | select(.draft == false) | .tag_name][0] // empty')
            fi

            if [ -z "$previous_tag" ]; then
              # No published releases for this branch — fall back to newest matching git tag
              if [[ "$HEAD_REF" =~ ^([0-9]+)\.x$ ]]; then
                previous_tag=$(gh api "repos/${GH_REPO}/tags?per_page=100" \
                  --jq "[.[] | select(.name | test(\"^v?${BASH_REMATCH[1]}\\\\.\"))][0].name // empty")
              else
                previous_tag=$(gh api "repos/${GH_REPO}/tags?per_page=1" --jq '.[0].name // empty')
              fi
            fi
          fi

          echo "Previous tag: ${previous_tag:-<none>}"

          # ---------------------------------------------------------------
          # 2. Decide the next version by looking at commit messages
          #    between previous_tag and HEAD.
          # ---------------------------------------------------------------
          if [ -n "${INPUT_NEXT_TAG:-}" ]; then
            next_tag="${INPUT_NEXT_TAG}"
          else
            if [ -z "$previous_tag" ]; then
              # No history at all for this branch — this is the very first release.
              if [[ "$HEAD_REF" =~ ^([0-9]+)\.x$ ]]; then
                next_version="${BASH_REMATCH[1]}.0.0"
              else
                next_version="0.1.0"
              fi
              next_tag_prefix=""
              messages=""
            else
              # Pull the prefix off the previous tag (preserve "v" vs no-"v").
              if [[ "$previous_tag" == v* ]]; then
                next_tag_prefix="v"
                stripped="${previous_tag#v}"
              else
                next_tag_prefix=""
                stripped="$previous_tag"
              fi

              # Parse semver.
              IFS='.' read -r major minor patch <<< "$stripped" || true
              major=${major:-0}
              minor=${minor:-0}
              patch=${patch:-0}
              patch=${patch%%[-+]*}
              [[ "$major" =~ ^[0-9]+$ ]] || major=0
              [[ "$minor" =~ ^[0-9]+$ ]] || minor=0
              [[ "$patch" =~ ^[0-9]+$ ]] || patch=0

              messages=$(gh api --paginate "repos/${GH_REPO}/compare/${previous_tag}...${HEAD_SHA}" \
                --jq '[.commits[].commit.message] | join("\n")')

              bump="patch"
              if printf '%s' "$messages" | grep -qE 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]+\))?!:'; then
                bump="major"
              elif printf '%s' "$messages" | grep -qE '^feat(\([^)]+\))?:'; then
                bump="minor"
              fi

              # Prevent a major bump from jumping across branch boundaries.
              # E.g. If we are on the "1.x" branch, we should never auto-bump to 2.0.0.
              if [[ "$HEAD_REF" =~ ^([0-9]+)\.x$ ]] && [ "$bump" = "major" ]; then
                echo "Warning: BREAKING CHANGE detected on branch ${HEAD_REF}. Capping bump to 'minor' to prevent branching out of bounds."
                bump="minor"
              fi

              case "$bump" in
                major) next_version="$((major + 1)).0.0" ;;
                minor) next_version="${major}.$((minor + 1)).0" ;;
                patch) next_version="${major}.${minor}.$((patch + 1))" ;;
              esac
            fi

            next_tag="${next_tag_prefix}${next_version}"
          fi

          echo "Next draft tag: ${next_tag}"

          # ---------------------------------------------------------------
          # 3. Build the changelog body from non-merge commits.
          # ---------------------------------------------------------------
          if [ -n "$previous_tag" ]; then
            # Extract full commit messages as a JSON array to handle newlines
            commit_messages_json=$(gh api --paginate "repos/${GH_REPO}/compare/${previous_tag}...${HEAD_SHA}" \
              --jq '[.commits[] | select((.parents | length) < 2) | .commit.message] | .[:100]')

            if [ "$commit_messages_json" = "[]" ] || [ -z "$commit_messages_json" ]; then
              echo "No commits between ${previous_tag} and HEAD — leaving any existing draft as-is."
              exit 0
            fi

            features=""
            fixes=""
            refactors=""
            styles=""
            testing=""
            docs=""
            cicd=""
            maintenance=""
            breaking=""
            other=""

            re_breaking='^[a-zA-Z]+(\([^)]+\))?!: '
            re_feat='^feat(\([^)]+\))?: '
            re_fix='^fix(\([^)]+\))?: '
            re_refactor='^refactor(\([^)]+\))?: '
            re_style='^style(\([^)]+\))?: '
            re_test='^test(\([^)]+\))?: '
            re_docs='^docs(\([^)]+\))?: '
            re_ci='^ci(\([^)]+\))?: '
            re_chore='^chore(\([^)]+\))?: '

            # Safely iterate over the JSON array of multiline commit messages
            for row in $(printf '%s' "$commit_messages_json" | jq -r '.[] | @base64'); do
              msg=$(printf '%s' "$row" | base64 --decode)
              
              # Extract subject (first line) and body (the rest)
              subject=$(printf '%s' "$msg" | head -n 1 | tr -d '\r')
              body=$(printf '%s' "$msg" | tail -n +2 | tr -d '\r' || true)
              
              # Strip Co-authored-by lines if requested
              if [ "${INPUT_EXCLUDE_CO_AUTHORS:-true}" = "true" ]; then
                body=$(printf '%s' "$body" | grep -vi '^Co-authored-by:' || true)
              fi

              # Start building the item with just the subject line
              item="- ${subject}"

              # If full commits are toggled on, and the body has text, append it as a blockquote
              if [ "${INPUT_INCLUDE_FULL_COMMITS:-false}" = "true" ] && [ -n "$(printf '%s' "$body" | tr -d ' \n\r')" ]; then
                # Clean up empty trailing lines
                body=$(printf '%s' "$body" | sed -e :a -e '/^\n*$/{$d;N;};/\n$/ba')
                body_indented=$(printf '%s' "$body" | awk '{print "  > "$0}')
                item="${item}\n${body_indented}"
              fi

              if [[ "$subject" =~ $re_breaking ]] || echo "$subject" | grep -q "BREAKING CHANGE"; then
                breaking+="${item}\n"
              elif [[ "$subject" =~ $re_feat ]]; then
                features+="${item}\n"
              elif [[ "$subject" =~ $re_fix ]]; then
                fixes+="${item}\n"
              elif [[ "$subject" =~ $re_refactor ]]; then
                refactors+="${item}\n"
              elif [[ "$subject" =~ $re_style ]]; then
                styles+="${item}\n"
              elif [[ "$subject" =~ $re_test ]]; then
                testing+="${item}\n"
              elif [[ "$subject" =~ $re_docs ]]; then
                docs+="${item}\n"
              elif [[ "$subject" =~ $re_ci ]]; then
                cicd+="${item}\n"
              elif [[ "$subject" =~ $re_chore ]]; then
                maintenance+="${item}\n"
              else
                other+="${item}\n"
              fi
            done

            changelog=""
            [[ -n "$breaking" ]] && changelog+="### ⚠️ Breaking Changes\n${breaking}\n"
            [[ -n "$features" ]] && changelog+="### ✨ Features\n${features}\n"
            [[ -n "$fixes" ]] && changelog+="### 🛠 Fixes\n${fixes}\n"
            [[ -n "$refactors" ]] && changelog+="### ♻️ Refactors\n${refactors}\n"
            [[ -n "$styles" ]] && changelog+="### 💅 Styling\n${styles}\n"
            [[ -n "$testing" ]] && changelog+="### 🧪 Testing\n${testing}\n"
            [[ -n "$docs" ]] && changelog+="### 📚 Documentation\n${docs}\n"
            [[ -n "$cicd" ]] && changelog+="### 🤖 CI/CD\n${cicd}\n"
            [[ -n "$maintenance" ]] && changelog+="### 🧹 Maintenance\n${maintenance}\n"
            [[ -n "$other" ]] && changelog+="### 🔄 Other\n${other}\n"

            # Trim trailing newlines
            changelog=$(printf "%b" "$changelog" | sed -e :a -e '/^\n*$/{$d;N;};/\n$/ba')

            body=$(printf "## What's Changed\n\n%b\n\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n" \
              "$changelog" "$GH_REPO" "$previous_tag" "$next_tag")
          else
            body="_Initial release._"
          fi

          # ---------------------------------------------------------------
          # 4. Find an existing draft to update; otherwise create a new one.
          # ---------------------------------------------------------------
          # Match drafts belonging strictly to this target branch
          existing_draft_id=$(gh api "repos/${GH_REPO}/releases?per_page=100" \
            --jq "[.[] | select(.draft == true and .target_commitish == \"$HEAD_REF\")][0].id // empty")

          if [ -n "$existing_draft_id" ]; then
            echo "Updating existing draft ${existing_draft_id} → ${next_tag} for branch ${HEAD_REF}"
            gh api -X PATCH "repos/${GH_REPO}/releases/${existing_draft_id}" \
              -f tag_name="$next_tag" \
              -f name="$next_tag" \
              -f body="$body" \
              -F draft=true > /dev/null
          else
            echo "Creating new draft ${next_tag} for branch ${HEAD_REF}"
            gh api -X POST "repos/${GH_REPO}/releases" \
              -f tag_name="$next_tag" \
              -f name="$next_tag" \
              -f target_commitish="$HEAD_REF" \
              -f body="$body" \
              -F draft=true > /dev/null
          fi

          echo "Draft is up to date: ${next_tag}"
